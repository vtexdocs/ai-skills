name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate skills
        run: bun run validate

      - name: Generate exports
        run: bun run export

      - name: Sync plugin directories
        run: |
          cp exports/cursor/*.mdc rules/
          rm -rf skills/
          cp -r exports/opencode/. skills/

      - name: Package platform tarballs
        run: |
          mkdir -p dist

          # AGENTS.md (recommended)
          tar czf dist/agents-md.tar.gz -C exports/agents-md .

          # Cursor rules
          tar czf dist/cursor-rules.tar.gz -C exports/cursor .

          # GitHub Copilot
          tar czf dist/copilot-instructions.tar.gz -C exports/copilot .

          # Claude Projects
          tar czf dist/claude-projects.tar.gz -C exports/claude .

          # OpenCode skills
          tar czf dist/opencode-skills.tar.gz -C exports/opencode .

          # Open Plugin (rules + skills + manifest)
          tar czf dist/open-plugin.tar.gz \
            rules/ \
            skills/ \
            .cursor-plugin/ \
            .plugin/

          # Full export bundle (all platforms)
          tar czf dist/all-exports.tar.gz exports/

          ls -lh dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VTEX AI Skills ${{ github.ref_name }}"
          body: |
            ## VTEX AI Skills ${{ github.ref_name }}

            21 AI agent skills for VTEX platform development across 5 tracks.

            ### Quick Install

            **AGENTS.md** (works with Cursor, Copilot, Codex, Windsurf, and more):
            ```bash
            curl -sL https://github.com/vtexdocs/ai-skills/releases/download/${{ github.ref_name }}/agents-md.tar.gz | tar xz -C /path/to/your-project/
            ```

            **Cursor rules:**
            ```bash
            mkdir -p .cursor/rules
            curl -sL https://github.com/vtexdocs/ai-skills/releases/download/${{ github.ref_name }}/cursor-rules.tar.gz | tar xz -C .cursor/rules/
            ```

            **GitHub Copilot:**
            ```bash
            mkdir -p .github
            curl -sL https://github.com/vtexdocs/ai-skills/releases/download/${{ github.ref_name }}/copilot-instructions.tar.gz | tar xz -C .github/
            ```

            **Open Plugin (Cursor plugin format):**
            ```bash
            curl -sL https://github.com/vtexdocs/ai-skills/releases/download/${{ github.ref_name }}/open-plugin.tar.gz | tar xz -C /path/to/your-project/
            ```

            See the [README](https://github.com/vtexdocs/ai-skills#quick-start) for all platforms.
          files: |
            dist/agents-md.tar.gz
            dist/cursor-rules.tar.gz
            dist/copilot-instructions.tar.gz
            dist/claude-projects.tar.gz
            dist/opencode-skills.tar.gz
            dist/open-plugin.tar.gz
            dist/all-exports.tar.gz
          generate_release_notes: true
