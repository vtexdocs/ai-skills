name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  upload-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate skills
        run: bun run validate

      - name: Generate exports
        run: bun run export

      - name: Sync plugin directories
        run: |
          rm -f rules/*.mdc
          cp exports/cursor/*.mdc rules/
          rm -rf skills/
          cp -r exports/opencode/. skills/

      - name: Package platform tarballs
        run: |
          mkdir -p dist

          # AGENTS.md (recommended)
          tar czf dist/agents-md.tar.gz -C exports/agents-md .

          # Cursor rules
          tar czf dist/cursor-rules.tar.gz -C exports/cursor .

          # GitHub Copilot
          tar czf dist/copilot-instructions.tar.gz -C exports/copilot .

          # Claude Projects
          tar czf dist/claude-projects.tar.gz -C exports/claude .

          # OpenCode skills
          tar czf dist/opencode-skills.tar.gz -C exports/opencode .

          # Open Plugin (rules + skills + manifest)
          tar czf dist/open-plugin.tar.gz \
            rules/ \
            skills/ \
            .cursor-plugin/ \
            .plugin/

          # Full export bundle (all platforms)
          tar czf dist/all-exports.tar.gz exports/

          ls -lh dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/agents-md.tar.gz
            dist/cursor-rules.tar.gz
            dist/copilot-instructions.tar.gz
            dist/claude-projects.tar.gz
            dist/opencode-skills.tar.gz
            dist/open-plugin.tar.gz
            dist/all-exports.tar.gz
